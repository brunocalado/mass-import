name: Publish Dev Release

on:
  push:
    branches:
      - main
      - hotfix/**
      - supportS3
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Compute branch folder
        id: vars
        shell: bash
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"

          if [[ "$BRANCH" == "main" ]]; then
            TARGET="dev"
            NON_TARGET="hotfix"
          else
            TARGET="hotfix"
            NON_TARGET="dev"
          fi

          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "non_target=$NON_TARGET" >> $GITHUB_OUTPUT

      - name: Set version
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Prepare release manifest
        shell: bash
        run: |
          TARGET="${{ steps.vars.outputs.target }}"
          VERSION="${TARGET}+${SHORT_SHA}"
          BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${TARGET}"
          jq \
            --arg version "$VERSION" \
            --arg download "${BASE}/mass-import.zip" \
            --arg manifest "${BASE}/module.json" \
            '.version = $version | .download = $download | .manifest = $manifest' \
            module.json > module.release.json
          mv module.release.json module.json

      - name: Zip module
        shell: bash
        run: |
          zip -r mass-import.zip . \
            -x ".*" \
            -x "build/*" \
            -x "node_modules/*" \
            -x "site/*" \
            -x "package.json" \
            -x "package-lock.json" \
            -x "webpack.config.js" \
            -x "fvtt.config.js" \
            -x "fvtt.config.example.js"

      - name: Create site structure
        shell: bash
        run: |
          mkdir -p site/dev site/hotfix

          NON_TARGET="${{ steps.vars.outputs.non_target }}"
          TARGET="${{ steps.vars.outputs.target }}"
          URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${NON_TARGET}"

          wget -q -O "site/${NON_TARGET}/mass-import.zip" "${URL}/mass-import.zip" || true
          wget -q -O "site/${NON_TARGET}/module.json" "${URL}/module.json" || true

          cp module.json mass-import.zip "site/${TARGET}/"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        uses: actions/deploy-pages@v4
